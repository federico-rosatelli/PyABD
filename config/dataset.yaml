datasets:
  breakfast:
    name: "Breakfast Actions Dataset"
    dataset: dinggd/breakfast
    dataset_path: ./data/.cache_dir/
    output_path: ./data/predictions/
    split_type: train
    split_name: split1
    streaming: false
    mode: offline   #online|offline
    boundaries:
      eval:
        kernel_size: 15
        window_size: 15
        threshold_classes: 6
      mid:
        kernel_size: 15
        window_size: 15
        threshold_classes: 6
  
  50salads:
    name: "50 Salads"
    dataset: fedecvg/50salads-idt
    dataset_path: ./data/50Salads_IDT/
    output_path: ./data/predictions/
    split_type: train
    streaming: false
    mode: offline   #online|offline
    boundaries:
      eval:
        kernel_size: 333
        window_size: 333
        threshold_classes: 12
      mid:
        kernel_size: 211
        window_size: 211
        threshold_classes: 19
    

  # gtea:
  #   name: "GTEA"
  #   num_classes: 11
  #   fps: 15
  #   feature_dim: 2048
  #   config_path: "config/gtea.yaml"

default_dataset: "breakfast"
